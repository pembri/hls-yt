name: Refresh HLS Stream

on:
  push:
    branches: [main]
    paths:
      - "channels.json"
  schedule:
    - cron: "0 */2 * * *"   # tiap 2 jam
  workflow_dispatch: {}      # bisa trigger manual

concurrency:
  group: refresh-stream
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Run refresh-stream.sh on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: bash ~/refresh-stream.sh
