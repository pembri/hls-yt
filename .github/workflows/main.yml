name: Auto Update Stream
on:
  push:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Tarik Link API
        run: |
          # API ini lebih stabil daripada kavin.rocks
          curl -s "https://api.piped.projectsegfau.lt/streams/8dNAAe5dcqQ" | jq -r '.hls' > stream.txt
      - name: Commit & Push
        run: |
          git config user.name "Bot"
          git config user.email "bot@github.com"
          git add stream.txt
          git commit -m "Update stream" || exit 0
          git push
