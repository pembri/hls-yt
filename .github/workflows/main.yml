name: Refresh YouTube HLS

on:
  schedule:
    - cron: '0 */4 * * *'  # Tiap 4 jam
  workflow_dispatch:         # Bisa trigger manual dari GitHub

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install yt-dlp
        run: pip install -U yt-dlp

      - name: Write cookies file
        run: |
          echo "${{ secrets.YT_COOKIES }}" > /tmp/yt-cookies.txt

      - name: Refresh HLS URLs
        env:
          WORKER_BASE: https://cdn-server-yt.pembriahmad526.workers.dev
        run: |
          python3 - <<'PYEOF'
          import json, subprocess, os

          worker_base = os.environ.get("WORKER_BASE", "")
          cookies_file = "/tmp/yt-cookies.txt"

          with open("channels.json") as f:
              channels = json.load(f)

          print(f"Found {len(channels)} channels")
          os.makedirs("channel", exist_ok=True)

          success = 0
          failed = 0
          successful_channels = []

          for slug, url in channels.items():
              print(f"  [{slug}] Processing...", end=" ", flush=True)
              try:
                  result = subprocess.run([
                      "yt-dlp", "-g",
                      "--no-warnings", "--quiet",
                      "--cookies", cookies_file,
                      "--extractor-args", "youtube:player_client=web,mweb",
                      url
                  ], capture_output=True, text=True, timeout=45)

                  hls_url = None
                  for line in result.stdout.strip().split("\n"):
                      if ".m3u8" in line:
                          hls_url = line.strip()
                          break

                  if hls_url:
                      with open(f"channel/{slug}.m3u8", "w") as f:
                          f.write(f"#EXTM3U\n#EXT-X-STREAM-INF:BANDWIDTH=0\n{hls_url}\n")
                      print("✅ OK")
                      success += 1
                      successful_channels.append(slug)
                  else:
                      print("❌ FAILED (no m3u8)")
                      if result.stderr:
                          print(f"     {result.stderr.strip()[:150]}")
                      failed += 1

              except subprocess.TimeoutExpired:
                  print("❌ TIMEOUT")
                  failed += 1
              except Exception as e:
                  print(f"❌ ERROR: {e}")
                  failed += 1

          print()
          print("📝 Generating playlist.m3u8...")
          playlist_lines = ["#EXTM3U"]
          for slug in successful_channels:
              name = slug.replace("-", " ").title()
              stream_url = f"{worker_base}/stream-hls/{slug}/master.m3u8"
              playlist_lines.append(f'#EXTINF:-1 tvg-name="{name}" tvg-id="{slug}",{name}')
              playlist_lines.append(stream_url)

          with open("playlist.m3u8", "w") as f:
              f.write("\n".join(playlist_lines) + "\n")

          print(f"✅ Success: {success} | ❌ Failed: {failed}")
          print(f"📺 playlist.m3u8: {len(successful_channels)} channels")

          # Fail job kalau semua channel gagal
          if success == 0:
              raise SystemExit("❌ Semua channel gagal, abort push.")
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add channel/ playlist.m3u8
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          TIMESTAMP=$(date '+%Y-%m-%d %H:%M UTC')
          git commit -m "refresh $TIMESTAMP"
          git push
