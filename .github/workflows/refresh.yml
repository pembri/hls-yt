name: Refresh HLS URLs

on:
  schedule:
    - cron: '*/30 * * * *'  # tiap 30 menit
  workflow_dispatch:          # bisa trigger manual

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install yt-dlp
        run: pip install -U yt-dlp

      - name: Write cookies
        run: echo "${{ secrets.YT_COOKIES }}" > /tmp/cookies.txt

      - name: Extract HLS URLs
        run: |
          python3 << 'PYEOF'
          import json, subprocess, os

          with open('channels.json') as f:
              channels = json.load(f)

          os.makedirs('channel', exist_ok=True)

          for slug, url in channels.items():
              print(f"Processing {slug}...")
              try:
                  result = subprocess.run([
                      'yt-dlp', '-g',
                      '--no-warnings', '--quiet',
                      '--cookies', '/tmp/cookies.txt',
                      '--extractor-args', 'youtube:player_client=ios',
                      url
                  ], capture_output=True, text=True, timeout=60)

                  hls_url = None
                  for line in result.stdout.strip().split('\n'):
                      if '.m3u8' in line:
                          hls_url = line.strip()
                          break

                  if hls_url:
                      content = f"#EXTM3U\n#EXT-X-STREAM-INF:BANDWIDTH=0\n{hls_url}\n"
                      with open(f'channel/{slug}.m3u8', 'w') as f:
                          f.write(content)
                      print(f"  OK: {slug}")
                  else:
                      print(f"  FAILED: {slug} - no m3u8 found")
                      print(f"  stderr: {result.stderr[:200]}")
              except Exception as e:
                  print(f"  ERROR: {slug} - {e}")
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add channel/
          git diff --staged --quiet || git commit -m "refresh HLS URLs $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
